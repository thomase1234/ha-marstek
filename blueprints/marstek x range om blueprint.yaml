blueprint:
  name: Marstek X range on the Meter
  description: >
    Control  Marstek Batteries according to a grid sensor and a target range  

    **Version: 1.9 **

    New: [marstek venus modbus](https://github.com/ViperRNMC/marstek_venus_modbus/tree/main) support

  author: Tazzios (Based on PimDoos`s works)
  domain: automation
  input:
    battery_section:
      name: Battery selection
      icon: mdi:battery
      input:
        battery_device:
          name: Battery`s
          description: Marstek Battery devices to control
          selector:
            device:
              filter:
                - integration: esphome
                - integration: marstek_modbus
              multiple: true
        battery_soc_min:
          name: Minimum State of Charge
          description: Batteries below this level will not participate in the load balancing pool
          default: 0
          selector:
            number:
              min: 0
              max: 99
        battery_soc_max:
          name: Maximum State of Charge
          description: Batteries above this level will not participate in the load balancing pool
          default: 100
          selector:
            number:
              min: 1
              max: 100

    rotation_section:
      name: Battery rotation
      description: Rotate multiple batteries
      icon: mdi:rotate-3d-variant
      input:
        priority_offset_template:
          name: Priority offset template
          description: Template defining a value to rotate battery priority by. Values higher than the number of batteries will loop back to 0.
          default: "{{ now().timetuple().tm_yday }}"
          selector:
            template:
        sort_by_soc:
          name: Keep SOC`s within 10%
          description: order the batteries by State of Charge so that they stay within 10% of each other. This overrides the Priority offset template.
          default: true
          selector:
            boolean: {}

    power_section:
      name: Power
      description: Power settings
      icon: mdi:flash
      input:
        battery_optimal_min:
          name: Battery Minimum power
          description: Minimum power to start a single battery with charge or discharge.
          default: 20
          selector:
            number:
              min: 0
              max: 2500
        battery_optimal_balancing:
          name: Max optimal power
          description: Amount of power required before loadbalancing to more batteries
          default: 2000
          selector:
            number:
              min: 50
              max: 2500
        battery_optimal_max:
          name: Battery maximum power
          description: Maximum  power that a single battery is allowed for charge or discharge.
          default: 2500
          selector:
            number:
              min: 50
              max: 2500
        # This value represents the minimum(aka charging) total setpoint for all batteries combined.
        # It will be inverted later in the blueprint to calculate 'min_setpoint' for logic.
        setpoint_min:
          name: Maximum charging
          description: If this is 0, charging is disabled. Total setpoint for all batteries combined.
          default: 12000
          selector:
            number:
              min: 0
              max: 12000
              mode: box
        setpoint_max:
          name: Maximum discharging
          description: If this is 0, discharging is disabled. Total setpoint for all batteries combined.
          default: 12000
          selector:
            number:
              min: 0
              max: 12000
              mode: box

    target_section:
      name: Target
      icon: mdi:target
      input:
        grid_entity:
          name: Grid
          description: Entity measuring grid net consumption
          selector:
            entity:
              filter:
                domain: sensor
                device_class: power
        offset_entity:
          name: Offset entities
          description: Entities whose value (in Watts) should be subtracted from the grid sensor. E.g. Car charger power sensor
          default: []
          selector:
            entity:
              multiple: true
              filter:
                domain:
                  - sensor
                  - number
                  - input_number

    setpoint_section:
      name: Setpoint
      description: You can create a deadband (-50 and 50) or set them the same if you want a fixed target. High value for charging and negative value for discharging.
      icon: mdi:flash
      input:
        setpoint_target_min:
          name: Target minimum value
          description: Lower limit for the Grid target band (in Watts)
          default: -200
          selector:
            number:
              min: -10000
              max: 5000
              mode: box
        setpoint_target_max:
          name: Target maximum value
          description: Upper limit for the Grid target band (in Watts)
          default: 200
          selector:
            number:
              min: -5000
              max: 10000
              mode: box

    smooth_section:
      name: smoothing
      description: Various option to control the smoothing of the setpoint.
      icon: mdi:tune
      input:
        smoothing_min_watts:
          name: Minimum differents
          description: Hysteresis, minimum delta (in watts) between previous and new setpoints. This should not be lower than the Minimum Power of one battery.
          default: 25
          selector:
            number:
              min: 0
              max: 500
        smoothing_max_watts:
          name: Maximum differents
          description: Maximum delta (in watts) between previous and new setpoints.
          default: 2000
          selector:
            number:
              min: 50
              max: 10000
        smoothing_above:
          name: Smoothing above
          description: Apply the smoothing factor only above this delta (in watts).
          default: 1000
          selector:
            number:
              min: 0
              max: 5000
        smoothing_factor:
          name: smoothing factor
          description: Example with old setpoint 1500 new 500 and factor 0.7. The differents 1500-500= 1000*0.7=700 new setpoint will be 1500-700=800. 1 to disable.
          default: 0.7
          selector:
            number:
              step: 0.01
              min: 0.01
              max: 1
        smoothing_factor_zero:
          name: smoothing factor when passing zero
          description: Same as above only this one is used when 0 is crossed. Set this lower to avoid switching between charge/discharge. 1 to disable
          default: 0.3
          selector:
            number:
              step: 0.01
              min: 0.01
              max: 1

    script_section:
      name: Script
      icon: mdi:tune
      input:
        update_interval:
          name: Update interval
          description: Time to wait before accepting new data from the grid sensor
          default:
            seconds: 10
          selector:
            duration: {}
        debug:
          name: Debug log
          description: log variables in the trace
          default: false
          selector:
            boolean: {}

variables:
  # Batttery selection
  device_ids: !input battery_device
  min_battery_level: !input battery_soc_min
  max_battery_level: !input battery_soc_max

  # Battery rotation
  priority_offset_template: !input priority_offset_template
  sort_by_soc: !input sort_by_soc

  # Power
  min_battery_power: !input battery_optimal_min
  balancing_battery_power: !input battery_optimal_balancing
  max_battery_power: !input battery_optimal_max
  # This makes 'min_setpoint' the opposite (negative) of the configured minimum setpoint.
  # For example: if setpoint_min = 12000 → min_setpoint = -12000
  setpoint_min: !input setpoint_min
  min_setpoint: >
    {{ 0 - (setpoint_min | float) }}
  max_setpoint: !input setpoint_max
  # Target
  grid_entity: !input grid_entity
  offset_entity: !input offset_entity

  # Setpoint
  target_min: !input setpoint_target_min
  target_max: !input setpoint_target_max

  #smoothing
  smoothing_min_watts: !input smoothing_min_watts
  smoothing_max_watts: !input smoothing_max_watts
  smoothing_above: !input smoothing_above
  smoothing_factor: !input smoothing_factor
  smoothing_factor_zero: !input smoothing_factor_zero

  # Script
  debug: !input debug

trigger:
  - trigger: state
    entity_id: !input grid_entity
  - trigger: homeassistant
    event: start

action:
  # calculate setpoint
  - variables:
      # Get grid power and convert to Watts
      grid: >
        {% set grid_unit = state_attr(grid_entity, "unit_of_measurement") %}
        {% set multiplier = 1 if grid_unit == "W" else 1000 if grid_unit == "kW" else 1 %}
        {% set grid_power = states(grid_entity) | float %}
        {{ grid_power * multiplier }}

      offset_total: >
        {{ (offset_entity if offset_entity is iterable else [offset_entity] | default([])) 
         | map('states') 
         | map('int', 0) 
         | sum }}

      # Count all actueel delivered power of the batteries together
      Battery_ac_power_total_old: >
        {% set total_ac_power = namespace(value=0) %}

        {% for dev in device_ids %}
          {% set ac_entity = device_entities(dev) | select("search","(ac_power|ac_vermogen)$") | list %}
          {% if ac_entity %}
            {% set ac_value = states(ac_entity[0]) | float(0) %}
            {% set total_ac_power.value = total_ac_power.value + ac_value %}
          {% endif %}
        {% endfor %}

        {{ total_ac_power.value }}
      Battery_ac_power_total: |
        {% set total_ac_power = namespace(value=0) %}
        {% for dev in device_ids %}
          {% set mode_entity = device_entities(dev) | select("search","(force_mode)$") | list %}
          {% if mode_entity %}
          {{ states(mode_entity[0]) }}
            {% if states(mode_entity[0]) == "stop" %}
              {% set ac_value = 0 %}
              {% set total_ac_power.value = total_ac_power.value + ac_value %}
            {% elif states(mode_entity[0]) == "charge" %}
              {% set power_entity = device_entities(dev) | select("search","(forcible_charge_power)$") | list %}
              {% set ac_value = states(power_entity[0]) | int %}
              {% set total_ac_power.value = total_ac_power.value - ac_value %}
            {% elif states(mode_entity[0]) == "discharge" %}
              {% set power_entity = device_entities(dev) | select("search","(forcible_discharge_power)$") | list %}
              {% set ac_value = states(power_entity[0]) | int %}
              {% set total_ac_power.value = total_ac_power.value + ac_value %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ total_ac_power.value }}
      setpoint: >
        {% set net_load = Battery_ac_power_total + grid %}
        {% if net_load < target_min %}
          {# te veel export -> laad batterij #}
          {% set target = (net_load - offset_total ) - target_min %}
        {% elif net_load > target_max %}
          {# te veel import -> ontlaad batterij #}
          {% set target = (net_load - offset_total) - target_max %}
        {% else %}
          {% set target = 0 - offset_total%}
        {% endif %}


        {# --- minimale verschil in watts --- #}
        {% if (target - Battery_ac_power_total) | abs < smoothing_min_watts %}
          {% set raw_setpoint = Battery_ac_power_total %}
        {% else %}
          {% set raw_setpoint = target %}
        {% endif %}

        {# --- maximale stap begrenzen in watts --- #}
        {% if raw_setpoint != 0 %}
          {% set raw_setpoint = [raw_setpoint, Battery_ac_power_total - smoothing_max_watts, min_setpoint] | max %}
          {% set raw_setpoint = [raw_setpoint, Battery_ac_power_total + smoothing_max_watts, max_setpoint] | min %}
        {% else %}
          {% set raw_setpoint = 0 %}
        {% endif %}

        {# --- nul-kruising detecteren en juiste smoothing factor kiezen --- #}
        {% if (raw_setpoint > 0 and Battery_ac_power_total < 0) or  (raw_setpoint < 0 and Battery_ac_power_total > 0) %}
          {% set sf = smoothing_factor_zero  %}
        {% elif raw_setpoint > smoothing_above %}
          {% set sf = smoothing_factor %} 
        {% else %}
          {% set sf = 1 %} 
        {% endif %}
         
        {# --- exponentiële smoothing toepassen --- #}
        {% set setpoint_smooth = sf * raw_setpoint + (1 - sf) * Battery_ac_power_total %}

        {{ setpoint_smooth | round(0) }}

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ debug }}"
        sequence:
          - service: logbook.log
            data:
              name: "Debug"
              message: >
                grid: {{ grid }}
                offset_total: {{ offset_total }}
                Battery_ac_power_total: {{ Battery_ac_power_total }}
                setpoint: {{ setpoint }}

  # order devices
  - variables:
      # Hernoemen naar reordeed ofzo
      device_ids: >
        {% if device_ids is string %}
            {% set device_ids = [ device_ids ] %}
        {% endif %}

        {% set soc_map = namespace(list=[]) %}
        {% for dev in device_ids %}
          {% set soc_entity = device_entities(dev) | select("search", "(state_of_charge|battery_soc|batterij_soc|batterie-Ladezustand)$") | list %}
          {% if soc_entity %}
            {% set soc_value = states(soc_entity[0]) | int %}
            {% if setpoint < 0 %}
              {# Laden: afronden SOC naar boven op tientallen #}
              {% set soc_rounded = ((soc_value + 9) // 10) * 10 %}
            {% else %}
              {# Ontladen: afronden SOC naar beneden op tientallen #}
              {% set soc_rounded = (soc_value // 10) * 10 %}
            {% endif %}   
            {% set soc_map.list = soc_map.list + [[soc_rounded, dev]] %}
          {% endif %}
        {% endfor %}

        {% if setpoint < 0 %} 
          {{ soc_map.list | sort(attribute=0) | map('last') | list }}
        {% else %}
          {{ soc_map.list | sort(attribute=0, reverse=True) | map('last') | list }}
        {% endif %}

      battery_count: >
        {% if device_ids is string %}
           {% set ids = [device_ids] %}
         {% else %}
           {% set ids = device_ids %}
         {% endif %}
         {{ ids | count }}

      priority_offset: >
        {% if sort_by_soc  %}
            {{ 0 }}
        {% else%}
            {{ priority_offset_template % battery_count }}
        {% endif %}

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ debug }}"
        sequence:
          - service: logbook.log
            data:
              name: "Debug"
              message: >
                device_ids: {{ device_ids }}
                battery_count: {{ battery_count }}
                priority_offset: {{ priority_offset }}

  # Battery entities into an array
  - variables:
      # Get Entity IDs from device IDs
      # in the search the entitity searchs is as followed lily / m5stack, ViperRNMC EN,ViperRNMC NL, ViperRNMC De
      battery_rs485_control_entity: >
        {% set entities = namespace(rs485_control=[]) %}
        {% for device_id in device_ids %}
          {% set entities.rs485_control = entities.rs485_control + [device_entities(device_id) | list | select("search","(rs485_control_mode|rs485_control_mode|rs485_besturingsmodus|rs485_steuermodus)$") | list | join("")] %}
        {% endfor %}
        {{ entities.rs485_control[priority_offset:] + entities.rs485_control[:priority_offset] }}

      battery_mode_entity: >
        {% set entities = namespace(mode=[]) %}
        {% for device_id in device_ids %}
          {% set entities.mode = entities.mode + [device_entities(device_id) | list | select("search","(forcible_charge_discharge|force_mode|geforceerde_modus|force_mode)$") | list | join("")] %}
        {% endfor %}
        {{ entities.mode[priority_offset:] + entities.mode[:priority_offset] }}

      battery_setpointcharge_entity: >
        {% set entities = namespace(setpointcharge=[]) %}
        {% for device_id in device_ids %}
          {% set entities.setpointcharge = entities.setpointcharge + [device_entities(device_id) | list | select("search","(forcible_charge_power|set_forcible_charge_power|forceer_laadvermogen|ladeleistung_einstellen)$") | list | join("")] %}
        {% endfor %}
        {{ entities.setpointcharge[priority_offset:] + entities.setpointcharge[:priority_offset] }}

      battery_setpointdischarge_entity: >
        {% set entities = namespace(setpointdischarge=[]) %}
        {% for device_id in device_ids %}
          {% set entities.setpointdischarge = entities.setpointdischarge + [device_entities(device_id) | list | select("search","(forcible_discharge_power|set_forcible_discharge_power|forceer_ontlaadvermogen|entladeleistung_einstellen)$") | list | join("")] %}
        {% endfor %}
        {{ entities.setpointdischarge[priority_offset:] + entities.setpointdischarge[:priority_offset] }}

      battery_soc_entity: >
        {% set entities = namespace(soc=[]) %}
        {% for device_id in device_ids %}
          {% set entities.soc = entities.soc + [device_entities(device_id) | list | select("search","(state_of_charge|battery_soc|batterij_soc|batterie-Ladezustand)$") | list | join("")] %}
        {% endfor %}
        {{ entities.soc[priority_offset:] + entities.soc[:priority_offset] }}

  - variables:
      battery_setpoints: >
        {% set num_optimal = ((setpoint | abs) / balancing_battery_power) | round(0,'ceil') %}
        {% set batteries = namespace(entities=[], available=[], standby=[]) %}

        {# Verdeel batteries in beschikbaar / standby #}
        {% for i in range(0,battery_count) %}


          {% if batteries.available | count < num_optimal 
             and (states(battery_rs485_control_entity[i]) == "enable" or states(battery_rs485_control_entity[i]) == "on")
             and (states(battery_soc_entity[i]) | int >= min_battery_level or setpoint < 0)
             and (states(battery_soc_entity[i]) | int <= max_battery_level or setpoint > 0) %}
            {% set batteries.available = batteries.available + [i] %}
          {% else %}
            {% set batteries.standby = batteries.standby + [i] %}
          {% endif %}									 		 
        {% endfor %}

        {% set divisor = (batteries.available | count) if (batteries.available | count) > 0 else 1 %}
        {% for i in batteries.available %}

                
          {# --- Bepaal de integratie --- #}
          {% set integration = config_entry_attr(config_entry_id(battery_rs485_control_entity[i]), 'domain') %}  
                    

          {% set value = (setpoint / divisor) | int %}
          
          {# Pas max en min limieten toe #}
          {% set value = [[value, -max_battery_power] | max, max_battery_power] | min %}
          {% if value | abs < min_battery_power %}
            {% set value = 0 %}
          {% endif %}
          {% set batteries.entities = batteries.entities + [{
            "setpointcharge": battery_setpointcharge_entity[i],
            "setpointdischarge": battery_setpointdischarge_entity[i],
            "rs485_control": battery_rs485_control_entity[i],
            "mode": battery_mode_entity[i],
            "integration": integration,
            "value": value
          }] %}
        {% endfor %}


        {% for i in batteries.standby %}

          {# --- Bepaal de integratie --- #}
          {% set integration = config_entry_attr(config_entry_id(battery_rs485_control_entity[i]), 'domain') %}  

          {% set batteries.entities = batteries.entities + [{
            "setpointcharge": battery_setpointcharge_entity[i],
            "setpointdischarge": battery_setpointdischarge_entity[i],
            "rs485_control": battery_rs485_control_entity[i],
            "mode": battery_mode_entity[i],
            "integration": integration,
            "value": 0
          }] %}
        {% endfor %}

        {{ batteries.entities }}

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ debug }}"
        sequence:
          - service: logbook.log
            data:
              name: "Debug"
              message: >
                battery_setpoints: {{ battery_setpoints }} {{battery_rs485_control_entity}}

  # --- Nul setpoints (standby / idle) ---
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ battery_setpoints | selectattr('value','eq',0) | list | count > 0 }}
        sequence:
          - repeat:
              for_each: >
                {{ battery_setpoints | selectattr('value','eq',0) | list }}
              sequence:
                - condition: template
                  value_template: >
                    {% set state = states(repeat.item.rs485_control) %}
                    {{ (repeat.item.integration == 'esphome' and state == 'enable')
                       or (repeat.item.integration == 'marstek_modbus' and state == 'on') }}
                - choose:
                    - conditions:
                        - condition: template
                          value_template: >
                            {% set state = states(repeat.item.rs485_control) %}
                            {{ (repeat.item.integration == 'esphome' and state != 'stop')
                              or (repeat.item.integration == 'marstek_modbus' and state != 'standby') }}

                      sequence:
                        - action: select.select_option
                          target:
                            entity_id: >
                              {# als mode is niet minder dan x minuten geleden gewijzigd #}
                              {{ repeat.item.mode }}

                          data:
                            option: stop
                        - action: number.set_value
                          continue_on_error: true
                          target:
                            entity_id: >
                              {{ repeat.item.setpointcharge }}
                          data:
                            value: 0
                        - action: number.set_value
                          continue_on_error: true
                          target:
                            entity_id: >
                              {{ repeat.item.setpointdischarge }}
                          data:
                            value: 0

  # --- Negatieve setpoints (laden) ---
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ battery_setpoints | selectattr('value','lt',0) | list | count > 0 }}
        sequence:
          - repeat:
              for_each: >
                {{ battery_setpoints | selectattr('value','lt',0) | list }}
              sequence:
                - condition: template
                  value_template: >
                    {% set state = states(repeat.item.rs485_control) %}
                    {{ (repeat.item.integration == 'esphome' and state == 'enable')
                       or (repeat.item.integration == 'marstek_modbus' and state == 'on') }}
                - choose:
                    - conditions:
                        - condition: template
                          value_template: >
                            {{ states(repeat.item.mode) != "charge" }}
                      sequence:
                        - action: select.select_option
                          target:
                            entity_id: >
                              {{ repeat.item.mode }}
                          data:
                            option: charge
                - action: number.set_value
                  continue_on_error: true
                  target:
                    entity_id: >
                      {{ repeat.item.setpointcharge }}
                  data:
                    # negatief setpoint omzetten in positief
                    value: >
                      {{ repeat.item.value | abs | int }}
                - choose:
                    - conditions:
                        - condition: template
                          value_template: >
                            {{ states(repeat.item.setpointdischarge) != 0 }}
                      sequence:
                        - action: number.set_value
                          continue_on_error: true
                          target:
                            entity_id: >
                              {{ repeat.item.setpointdischarge }}
                          data:
                            # ander setpoint wissen
                            value: 0

  # --- Positieve setpoints (ontladen) ---
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ battery_setpoints | selectattr('value','gt',0) | list | count > 0 }}
        sequence:
          - repeat:
              for_each: >
                {{ battery_setpoints | selectattr('value','gt',0) | list }}
              sequence:
                - condition: template
                  value_template: >
                    {{ states(repeat.item.rs485_control) == "enable" or states(repeat.item.rs485_control) == "on" }}
                - choose:
                    - conditions:
                        - condition: template
                          value_template: >
                            {{ states(repeat.item.mode) != "discharge" }}
                      sequence:
                        - action: select.select_option
                          target:
                            entity_id: >
                              {{ repeat.item.mode }}
                          data:
                            option: discharge
                - action: number.set_value
                  continue_on_error: true
                  target:
                    entity_id: >
                      {{ repeat.item.setpointdischarge }}
                  data:
                    value: >
                      {{ repeat.item.value | int }}
                - choose:
                    - conditions:
                        - condition: template
                          value_template: >
                            {{ states(repeat.item.setpointcharge) != 0 }}
                      sequence:
                        - action: number.set_value
                          continue_on_error: true
                          target:
                            entity_id: >
                              {{ repeat.item.setpointcharge }}
                          data:
                            value: 0

  - delay: !input update_interval
